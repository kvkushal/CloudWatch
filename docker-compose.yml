version: '3.8'

services:
  # ---------- Infrastructure ----------
  dynamodb:
    image: amazon/dynamodb-local
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/shell/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- Data Pipeline ----------
  init:
    build: .
    command: >
      sh -c "
        echo '=== Creating tables ===' &&
        python dynamo_manager.py &&
        echo '=== Generating data ===' &&
        python data_generator.py &&
        echo '=== Running anomaly detection ===' &&
        python anomaly_detector.py &&
        echo '=== Running recommendation engine ===' &&
        python recommendation_engine.py &&
        echo '=== Init complete ==='
      "
    environment:
      - DYNAMODB_ENDPOINT=http://dynamodb:8000
      - REDIS_HOST=redis
      - DEMO_MODE=false
    depends_on:
      dynamodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------- Application ----------
  api:
    build: .
    command: python api.py
    ports:
      - "5000:5000"
    environment:
      - DYNAMODB_ENDPOINT=http://dynamodb:8000
      - REDIS_HOST=redis
      - DEMO_MODE=false
    depends_on:
      init:
        condition: service_completed_successfully

  dashboard:
    build: .
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - DYNAMODB_ENDPOINT=http://dynamodb:8000
      - REDIS_HOST=redis
      - DEMO_MODE=false
    depends_on:
      api:
        condition: service_started