name: CI-CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ========== STAGE 1: BUILD ==========
  build:
    name: Build & Install
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Verify imports
      run: |
        python -c "import flask; print(f'Flask {flask.__version__}')"
        python -c "import boto3; print(f'boto3 {boto3.__version__}')"
        python -c "import redis; print(f'redis {redis.__version__}')"
        python -c "import streamlit; print(f'Streamlit {streamlit.__version__}')"

  # ========== STAGE 2: TEST ==========
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: build

    services:
      dynamodb:
        image: amazon/dynamodb-local
        ports:
          - 8000:8000
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Wait for DynamoDB
      run: |
        for i in {1..15}; do
          curl -s http://localhost:8000/shell/ && break || sleep 2
        done

    - name: Initialize database tables
      run: python dynamo_manager.py

    - name: Generate test data
      run: python data_generator.py

    - name: Run anomaly detection
      run: python anomaly_detector.py

    - name: Run recommendation engine
      run: python recommendation_engine.py

    - name: Run test suite
      run: pytest test_api.py -v --tb=short

    - name: Run performance test (smoke)
      run: |
        python -c "
        import time
        from api import app
        client = app.test_client()
        times = []
        for _ in range(50):
            start = time.time()
            client.get('/api/dashboard/acct-001')
            times.append(time.time() - start)
        avg_ms = sum(times) / len(times) * 1000
        print(f'Avg dashboard latency: {avg_ms:.2f}ms')
        assert avg_ms < 500, f'Latency too high: {avg_ms:.2f}ms'
        "

  # ========== STAGE 3: DEPLOY ==========
  deploy:
    name: Build & Deploy Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t cloudwatch-app:${{ github.sha }} .

    - name: Tag as latest
      run: docker tag cloudwatch-app:${{ github.sha }} cloudwatch-app:latest

    - name: Verify Docker image
      run: |
        docker images cloudwatch-app
        echo "Image size:"
        docker inspect cloudwatch-app:latest --format='{{.Size}}' | numfmt --to=iec

    - name: Run container smoke test
      run: |
        docker run -d --name test-container -p 5000:5000 cloudwatch-app:latest || true
        sleep 3
        docker logs test-container 2>&1 | head -20
        docker stop test-container || true
        docker rm test-container || true

    - name: Deployment summary
      run: |
        echo "========================================="
        echo "  DEPLOYMENT SUCCESSFUL"
        echo "  Image: cloudwatch-app:${{ github.sha }}"
        echo "  Branch: ${{ github.ref_name }}"
        echo "  Commit: ${{ github.sha }}"
        echo "========================================="